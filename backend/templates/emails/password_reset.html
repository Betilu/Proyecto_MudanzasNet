<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #1e293b; max-width: 560px; margin: 0 auto; padding: 24px;">
  <p>Hola <strong>{{ user.nombre }}</strong>,</p>
  <p>Recibimos una solicitud para restablecer la contraseña de tu cuenta en <strong>{{ site_name }}</strong>.</p>
  <p>
    <a href="{{ reset_url }}" style="display: inline-block; background: #0ea5e9; color: #fff; text-decoration: none; padding: 12px 20px; border-radius: 10px; font-weight: 600;">Restablecer contraseña</a>
  </p>
  <p style="font-size: 13px; color: #64748b;">Si el botón no funciona, copia y pega esta URL en el navegador:</p>
  <p style="font-size: 12px; word-break: break-all; color: #475569;">{{ reset_url }}</p>
  <p style="font-size: 13px; color: #64748b;">Si no solicitaste este cambio, puedes ignorar este correo.</p>
  <p style="margin-top: 24px; font-size: 13px; color: #94a3b8;">— {{ site_name }}</p>
</body>
</html>
